name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/golang
            .semgrep/rules.yml

      - name: Gitleaks secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fireline
          POSTGRES_PASSWORD: fireline
          POSTGRES_DB: fireline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fireline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Atlas
        run: curl -sSf https://atlasgo.sh | sh

      - name: Run migrations
        run: |
          atlas migrate hash --dir file://migrations
          atlas migrate apply --dir file://migrations --url "postgres://fireline:fireline@localhost:5432/fireline?sslmode=disable"

      - name: Check RLS completeness
        run: ./scripts/check_rls.sh
        env:
          TEST_DATABASE_URL: "postgres://fireline:fireline@localhost:5432/fireline?sslmode=disable"

      - name: Run tests
        env:
          TEST_DATABASE_URL: "postgres://fireline:fireline@localhost:5432/fireline?sslmode=disable"
          TEST_APP_DATABASE_URL: "postgres://fireline_app:fireline_app@localhost:5432/fireline?sslmode=disable"
        run: go test ./... -v -race -count=1

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binary
        run: CGO_ENABLED=0 go build -o fireline ./cmd/fireline
      - name: Build Docker image
        run: docker build -t fireline:ci .
